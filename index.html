<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f0f23" />
    <title>PitchPractice — AI Audience Simulator</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; height: 100%; background: #0f0f23; }
      body { overscroll-behavior-y: contain; }
      #root { min-height: 100%; min-height: 100dvh; }
      input, select, textarea { font-size: 16px !important; }
      /* Momentum scrolling for iOS */
      .scroll-touch { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
